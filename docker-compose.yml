# ──────────────────────────────────────────────────────────────────────────────
# Hallucination Detector Gym — Docker Compose
#
# Single-command startup: docker compose up --build
# ──────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  hallucination-detector-gym:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hallucination-detector-gym
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 8G
